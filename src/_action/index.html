<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Van Timer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    @import url("/css/pico.min.css") layer;
  </style>
  <link href="/css/main.css" rel="stylesheet">
  <link href="/images/timer.ico" rel="icon" type="image/x-icon">
  <link href="/manifest.json" rel="manifest">
</head>

<body class="container">

  <header>
    <nav>
      <ul>
        <li class="pb-0 pt-0">
          <h1 _click="addTimer" class="m-0">
            <img class="pointer" src="/images/timer.svg" alt="Timer Hourglass logo" style="height: 2em; width: 1.56em;">
          </h1>
        </li>
      </ul>
      <ul>
        <li><button _click="addTimer">Add Timer</button></li>
        <li><button commandfor="appSettings" command="show-modal">⚙</button></li>
      </ul>
    </nav>
  </header>

  <main>
    <section id="timers" class="grid timer-cards">
      <template id="timerTemplate">
        <article data-root>
          <form x="timerForm" _change="save">
            <input name="id" type="hidden">
            <header class="pb-0">
              <fieldset role="group">
                <input x="title" id="timerTitle" class="plain" name="title" type="text" placeholder="Title">
                <label x="titleLabel" for="timerTitle" aria-label="Timer Title">✎</label>
              </fieldset>
            </header>
            <fieldset role="group">
              <input name="hours" type="number" placeholder="h">
              <input name="minutes" type="number" placeholder="m">
              <input name="seconds" type="number" placeholder="s">
            </fieldset>
            <div class="flex">
              <button _click="toggleTimerState" x="clock" title="Click to start." aria-label="Click to start."
                style="width: 140px;">Start</button>
              <span hidden><audio x="audio" loop></audio></span>
              <button hidden x="restart" _click="restart">↻</button>
              <button class="mb-0" x="openSettings" type="button" command="show-modal">⚙</button>
              <button _click="deleteTimer">❌</button>
            </div>
          </form>
          <dialog x="timerSettings">
            <article data-box>
              <header>
                <button x="modalCloseButton" form="modalClose" aria-label="Close" value="cancel" rel="prev"></button>
                <h2 class="inline">Options</h2>
              </header>
              <div x="sounds">
                <legend>Sound</legend>
                <label><input type="radio" name="sound" value="default">Default</label>
                <label><input type="radio" name="sound" value="random">Random</label>
              </div>
            </article>
          </dialog>
          <form id="modalClose" method="dialog"></form>
        </article>
      </template>
    </section>
  </main>

  <dialog id="appSettings" onclose="dataAction(event)" _close="saveAppSettings">
    <article data-box>
      <header>
        <button form="appSettingsDialogForm" aria-label="Close" value="cancel" rel="prev"></button>
        <h2 class="inline">Options for All Timers</h2>
      </header>
      <h3>Allowed Sounds</h3>
      <fieldset id="allowedSounds">
        <button _click="toggleSounds">Toggle All</button>
        <hr>
      </fieldset>
    </article>
    <form id="appSettingsDialogForm" method="dialog"></form>
  </dialog>

  <footer class="container">
    <a href="https://github.com/jon49/timer/tree/master/src/_action">Source Code</a>
    <br>
    <small>Created with <a href="https://www.freesoundeffects.com/">Sounds</a>.</small>
  </footer>

  <script src="/src/main.ts" type="module"></script>
</body>

</html>
